<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register | Auth System</title><link rel="stylesheet" href="/static/style.css"></head><body><main class="card"><h1>Create an account</h1><p class="subtitle">Your password is securely hashed before it is stored.</p><form id="register-form" novalidate><label for="username">Username</label><input id="username" name="username" autocomplete="username" required><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="email" required><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="new-password" required><label for="confirmPassword">Confirm password</label><input id="confirmPassword" type="password" autocomplete="new-password" required><p id="message" class="notice" aria-live="polite"></p><button>Create account</button></form><p>Already registered? <a class="link" href="/">Sign in</a></p></main><script src="/static/script.js"></script></body></html>
