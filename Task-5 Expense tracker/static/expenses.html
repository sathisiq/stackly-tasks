<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Spendly</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <main class="shell">
        <nav class="nav"><a class="logo" href="/dashboard.html">Spendly</a>
            <div class="nav-links"><a href="/dashboard.html">Dashboard</a><a class="active"
                    href="/expenses.html">Expenses</a><button class="small secondary" data-logout>Logout</button></div>
        </nav>
        <div class="page-heading">
            <div>
                <h1>Expenses</h1>
                <p class="sub">Add, edit, and organise every purchase.</p>
            </div>
        </div>
        <div class="expenses-layout">
            <aside class="panel">
                <h2 id="formTitle">Add expense</h2>
                <form id="expenseForm">
                    <div class="field"><label>Title</label><input name="title" maxlength="100" required></div>
                    <div class="field"><label>Amount</label><input name="amount" type="number" min="0.01" step="0.01"
                            required></div>
                    <div class="field"><label>Category</label><select name="category" required>
                            <option value="">Choose category</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Shopping</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select></div>
                    <div class="field"><label>Date</label><input name="date" type="date" required></div>
                    <div class="field"><label>Note <small>(optional)</small></label><textarea name="note"
                            maxlength="255"></textarea></div>
                    <div class="form-actions"><button id="saveButton">Add expense</button><button type="button"
                            id="cancelEdit" class="secondary hidden">Cancel</button></div>
                    <p id="formMessage" class="message"></p>
                </form>
            </aside>
            <section class="panel">
                <h2>All expenses</h2>
                <div class="filter">
                    <div class="field"><label>Category</label><select id="filterCategory">
                            <option value="">All categories</option>
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Shopping</option>
                            <option>Health</option>
                            <option>Education</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select></div>
                    <div class="field"><label>From</label><input id="filterFrom" type="date"></div>
                    <div class="field"><label>To</label><input id="filterTo" type="date"></div><button class="secondary"
                        id="clearFilters" type="button">Clear</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Expense</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="expenseTable"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
