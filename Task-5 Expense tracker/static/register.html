<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Spendly</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="auth">
    <main class="auth-card">
        <div class="logo">Spendly</div>
        <h1>Create your account</h1>
        <p class="sub">Your expenses stay private to you.</p>
        <form id="registerForm">
            <div class="field"><label>Username</label><input name="username" minlength="3" maxlength="50" required>
            </div>
            <div class="field"><label>Email</label><input name="email" type="email" required></div>
            <div class="field"><label>Password</label><input name="password" type="password" minlength="6" required>
            </div>
            <div class="field"><label>Confirm password</label><input name="confirm" type="password" minlength="6"
                    required></div><button>Create account</button>
            <p id="message" class="message"></p>
        </form>
        <p class="auth-footer">Already registered? <a href="/login.html">Log in</a></p>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
